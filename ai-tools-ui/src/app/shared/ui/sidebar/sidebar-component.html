<aside class="sidebar" [class.sidebar_expanded]="isExpanded">
  <div class="sidebar__toolbar">
    <button class="sidebar__menu-btn" (click)="toggle()">
      <i class="pi pi-bars"></i>
    </button>
     <span class="sidebar__menu-text">Меню</span>
  </div>

  <nav class="sidebar__nav">
    <a class="sidebar__link" routerLink="/documents" routerLinkActive="sidebar__link_active">
      <img src="/assets/icons/documents.svg" alt="Материалы" class="siderbar_icon_btn" />
      <span class="sidebar__link-text">Материалы</span>
    </a>
    <div class="divider"></div>
    <a
      class="sidebar__link"
      routerLink="/document"
      [class.sidebar__link_active]="documentSectionActive()"
    >
      <img src="/assets/icons/parser.svg" alt="Документ" class="siderbar_icon_btn" />
      <span class="sidebar__link-text">Документ</span>
    </a>
    <div class="divider"></div>
    <a class="sidebar__link" routerLink="/sources" routerLinkActive="sidebar__link_active">
      <img src="/assets/icons/Sources.svg" alt="Источники" class="siderbar_icon_btn" />
      <span class="sidebar__link-text">Источники</span>
    </a>
    <div class="divider"></div>
    <a
      class="sidebar__link"
      routerLink="/tools"
      [class.sidebar__link_active]="toolsSectionActive()"
    >
      <img src="/assets/icons/library.svg" alt="Инструменты" class="siderbar_icon_btn" />
      <span class="sidebar__link-text">Инструменты</span>
    </a>
    <div class="divider"></div>
    <a
      class="sidebar__link"
      routerLink="/processing-dashboard"
      routerLinkActive="sidebar__link_active"
    >
      <img src="/assets/icons/Monitoring.svg" alt="Мониторинг обработки" class="siderbar_icon_btn" />
      <span class="sidebar__link-text">Мониторинг jobs</span>
    </a>
    <div class="divider"></div>
  </nav>
</aside>
