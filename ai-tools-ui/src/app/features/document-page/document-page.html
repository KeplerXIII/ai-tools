<section class="document-page">
  <div class="document-page__modes" role="tablist" aria-label="Способ создания">
    <button
      type="button"
      class="document-page__mode-btn"
      role="tab"
      [attr.aria-selected]="creationMode === 'material'"
      [class.document-page__mode-btn_active]="creationMode === 'material'"
      (click)="setMode('material')"
    >
      Документ
    </button>
    <button
      type="button"
      class="document-page__mode-btn"
      role="tab"
      [attr.aria-selected]="creationMode === 'url'"
      [class.document-page__mode-btn_active]="creationMode === 'url'"
      (click)="setMode('url')"
    >
      Парсинг по URL
    </button>
    <button
      type="button"
      class="document-page__mode-btn"
      role="tab"
      [attr.aria-selected]="creationMode === 'template'"
      [class.document-page__mode-btn_active]="creationMode === 'template'"
      (click)="setMode('template')"
    >
      Создать
    </button>
  </div>

  @if (creationMode === 'url' || creationMode === 'material') {
    <div class="document-page__panel">
      <app-article-parser [embedded]="true" [hideUrlForm]="creationMode === 'material'" />
    </div>
  } @else {
    <div class="document-page__placeholder">
      <p>
        Режим «Создать» — заготовка для ручного ввода. Здесь появится форма и сценарий заполнения материала
        без разбора по URL.
      </p>
    </div>
  }
</section>
