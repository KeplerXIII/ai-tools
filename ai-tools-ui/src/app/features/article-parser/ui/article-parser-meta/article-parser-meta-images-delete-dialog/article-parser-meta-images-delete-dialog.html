<p-dialog
  [(visible)]="dialogVisible"
  [modal]="true"
  [dismissableMask]="true"
  [closable]="true"
  [closeOnEscape]="true"
  [draggable]="false"
  [appendTo]="'self'"
  [style]="{ width: 'min(36rem, 94vw)' }"
  styleClass="article-meta-images-dialog"
  header="Удаление изображений"
  (onHide)="onDialogHide()"
>
  <div class="images-manage-list">
    @for (row of rows; track row.url; let i = $index) {
      <div class="images-manage-row">
        <p-checkbox
          [(ngModel)]="row.selected"
          [binary]="true"
          [inputId]="'article-meta-img-del-cb-' + i"
        />
        <div class="images-manage-body">
          <div class="images-manage-thumb-wrap">
            <img
              [src]="row.url"
              [attr.alt]="row.alt || row.title || 'Превью'"
              class="images-manage-thumb"
            />
          </div>
          <div class="images-manage-caption">
            @if (row.title) {
              <div class="images-manage-title">{{ row.title }}</div>
            }
            @if (row.alt) {
              <div class="images-manage-alt">{{ row.alt }}</div>
            }
            @if (!row.title && !row.alt) {
              <span class="images-manage-muted">Нет подписи</span>
            }
          </div>
        </div>
      </div>
    }
  </div>
  <ng-template pTemplate="footer">
    <div class="images-manage-footer">
      @if (!canPersist) {
        <p class="images-manage-footer-hint">
          Сохранение недоступно: у документа нет идентификатора на сервере.
        </p>
      }
      <div class="images-manage-footer-actions">
        <button type="button" class="images-manage-btn images-manage-btn--ghost" (click)="close()">
          Отмена
        </button>
        <button
          type="button"
          class="images-manage-btn images-manage-btn--danger"
          [disabled]="!hasSelectedForDelete || !canPersist || deleteLoading"
          (click)="deleteSelected()"
        >
          @if (deleteLoading) {
            Удаление…
          } @else {
            Удалить выбранные фотографии
          }
        </button>
      </div>
    </div>
  </ng-template>
</p-dialog>
