<ng-template #metaGalleriaItemBody>
  @if (activeSlide; as slide) {
    <div
      class="meta-galleria-item-viewport meta-galleria-item-viewport--open-fs"
      role="button"
      tabindex="0"
      [attr.aria-label]="'Открыть изображение на весь экран'"
      (click)="openLightbox($event)"
      (keydown.enter)="openLightbox($event)"
      (keydown.space)="$event.preventDefault(); openLightbox($event)"
    >
      <img
        [src]="slide.itemImageSrc"
        [attr.alt]="slide.alt || 'Изображение статьи'"
        class="meta-galleria-item-img"
        (error)="onItemImageError($event)"
      />
    </div>
  }
</ng-template>

<ng-template #metaGalleriaThumbnailBody let-item>
  <div
    class="meta-galleria-thumb-wrap meta-galleria-thumb-wrap--open-fs"
    role="button"
    tabindex="0"
    [attr.aria-label]="'Открыть изображение на весь экран'"
    (click)="openLightboxFromThumbnail(item, $event)"
    (keydown.enter)="openLightboxFromThumbnail(item, $event)"
    (keydown.space)="$event.preventDefault(); openLightboxFromThumbnail(item, $event)"
  >
    <img
      [src]="item.thumbnailImageSrc"
      [attr.alt]="item.alt || ''"
      class="meta-galleria-thumb-img"
    />
  </div>
</ng-template>

<div class="meta-galleria-card">
  <p-galleria
    [value]="items"
    [(activeIndex)]="galleriaActiveIndex"
    [responsiveOptions]="responsiveOptions"
    [containerStyle]="containerStyle"
    [numVisible]="5"
    [showThumbnails]="true"
    [showItemNavigators]="true"
    [showItemNavigatorsOnHover]="true"
    [circular]="true"
    class="meta-article-galleria"
  >
    <ng-template pTemplate="item">
      <ng-container *ngTemplateOutlet="metaGalleriaItemBody" />
    </ng-template>
    <ng-template pTemplate="thumbnail" let-item>
      <ng-container *ngTemplateOutlet="metaGalleriaThumbnailBody; context: { $implicit: item }" />
    </ng-template>
  </p-galleria>
</div>

<p-galleria
  [value]="items"
  [(activeIndex)]="galleriaActiveIndex"
  [fullScreen]="true"
  [(visible)]="lightboxVisible"
  [responsiveOptions]="responsiveLightboxOptions"
  [containerStyle]="lightboxContainerStyle"
  [numVisible]="8"
  [showThumbnails]="true"
  [showItemNavigators]="true"
  [showItemNavigatorsOnHover]="false"
  [circular]="true"
  [baseZIndex]="1200"
  class="meta-article-galleria meta-galleria-fullscreen"
>
  <ng-template pTemplate="item">
    <ng-container *ngTemplateOutlet="metaGalleriaItemBody" />
  </ng-template>
  <ng-template pTemplate="thumbnail" let-item>
    <ng-container *ngTemplateOutlet="metaGalleriaThumbnailBody; context: { $implicit: item }" />
  </ng-template>
</p-galleria>
