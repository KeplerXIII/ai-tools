<div class="tool-card">
  <div class="parser_header">
    <h1 class="parser_title">Парсер статьи</h1>
    <p class="parser_subtitle">Извлечение текста статьи, сущностей, перевода, тегов и аннотации.</p>
  </div>

  <app-article-parser-url-form
    [(url)]="state.url"
    [loading]="isDisabled"
    (submitUrl)="extractArticle()"
    (clearClicked)="clear()"
  />

  @if (articleError) {
    <div class="field-error">{{ articleError }}</div>
  }

  @if (loadingArticle) {
    <app-article-parser-article-loading />
  }

  @if (state.article) {
    <div class="article-grid">
      <app-article-parser-status [article]="state.article" />
      <app-article-parser-meta [article]="state.article" />
      <app-article-parser-categories
        [article]="state.article"
        [buttonsDisabled]="isDisabled"
        (categorizationLoadingChange)="loadingCategories = $event"
      />
      <app-article-parser-entities
        [article]="state.article"
        [buttonsDisabled]="isDisabled"
        [loadingOriginalTags]="loadingOriginalTags"
        [loadingTranslatedTags]="loadingTranslatedTags"
        (entitiesLoadingChange)="loadingEntitiesSection = $event"
      />
    </div>

    <app-article-parser-original-text
      [isDisabled]="isDisabled"
      [originalTagsError]="originalTagsError"
      [translationError]="translationError"
      (tagOriginal)="tagOriginal()"
      (translateArticle)="translateArticle()"
    />

    <app-article-parser-translation
      [isDisabled]="isDisabled"
      [loadingTranslation]="loadingTranslation"
      [translatedTagsError]="translatedTagsError"
      [summaryError]="summaryError"
      (tagTranslated)="tagTranslated()"
      (summarizeArticle)="summarizeArticle()"
    />

    <app-article-parser-annotation [loadingSummary]="loadingSummary" />
  }
</div>
