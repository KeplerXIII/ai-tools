<section class="sources-page">
  <header class="sources-header">
    <h1 class="sources-title">Источники</h1>

    <div class="sources-filters">
      @if (canFilterByAllUsers) {
        <label class="filter-item">
          <span class="filter-item__label">Пользователь</span>
          <p-select
            class="sources-filter-select"
            [options]="userFilterSelectOptions"
            [(ngModel)]="selectedUserId"
            optionLabel="label"
            optionValue="value"
            placeholder="Все"
            (ngModelChange)="onUserFilterChange()"
          />
        </label>
      }

      <label class="filter-item">
        <span class="filter-item__label">Сортировка</span>
        <p-select
          class="sources-filter-select"
          [options]="sortSelectOptions"
          [(ngModel)]="sortMode"
          optionLabel="label"
          optionValue="value"
        />
      </label>

      <app-outline-button
        class="sources-filters__reset"
        text="Сбросить"
        size="large"
        (clicked)="resetFilters()"
      />
    </div>
  </header>

  <app-sources-create-section (sourceCreated)="loadSources()" />

  <app-sources-list-accordion
    [displayItems]="sortedItems"
    [allItems]="items"
    [listLoading]="listLoading"
    [listError]="listError"
    [listEmpty]="listEmpty"
  />
</section>
