@if (showAppShell) {
  <div class="layout">
    <app-sidebar-component></app-sidebar-component>

    <div class="content">
      <app-header-component></app-header-component>

      <main class="page">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
} @else {
  <router-outlet></router-outlet>
}

@if (translateBatchNotifier.toast$ | async; as toast) {
  <div class="global-toast" [class.global-toast_error]="toast.kind === 'error'" (click)="translateBatchNotifier.dismissToast()">
    {{ toast.text }}
  </div>
}
