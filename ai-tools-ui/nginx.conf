server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://ai-tools:8000/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Разбор источника: POST /parsing/sources/parse (202); SSE: …/parse-runs/{id}/stream
        # (долгие потоки — см. отдельный location ниже, иначе буферизация прокси).
        proxy_connect_timeout 300s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
    }

    # Low-latency SSE stream for processing dashboard.
    location = /api/v1/processing/dashboard/stream {
        proxy_pass http://ai-tools:8000/api/v1/processing/dashboard/stream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache off;
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        proxy_read_timeout 1800s;
    }

    # SSE: статус разбора источника (без буферизации).
    # Regex-location: proxy_pass без URI не добавляет путь к upstream — задаём полный путь с capture.
    location ~ ^/api/v1/parsing/sources/parse-runs/([^/]+)/stream$ {
        proxy_pass http://ai-tools:8000/api/v1/parsing/sources/parse-runs/$1/stream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache off;
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        proxy_read_timeout 1800s;
    }

    # SSE: прогресс массового батча (тосты).
    location ~ ^/api/v1/processing/batches/([^/]+)/stream$ {
        proxy_pass http://ai-tools:8000/api/v1/processing/batches/$1/stream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache off;
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        proxy_read_timeout 1800s;
    }
}
