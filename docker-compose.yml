services:
  ai-tools:
    build: .
    container_name: ai-tools
    env_file:
      - .env
    ports:
      - "8010:8000"
    networks:
      - ai_stack
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  ai-tools-translate-worker:
    build: .
    container_name: ai-tools-translate-worker
    env_file:
      - .env
    command: ["uv", "run", "saq", "app.workers.documents_translate_worker.settings"]
    networks:
      - ai_stack
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  ai-tools-annotate-worker:
    build: .
    container_name: ai-tools-annotate-worker
    env_file:
      - .env
    command: ["uv", "run", "saq", "app.workers.documents_annotate_worker.settings"]
    networks:
      - ai_stack
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  ai-tools-ui:
    build:
      context: ./ai-tools-ui
    container_name: ai-tools-ui
    ports:
      - "8088:80"
    networks:
      - ai_stack
    restart: unless-stopped
    depends_on:
      - ai-tools

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-tools-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_stack
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai-tools-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - ai_stack
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  ai_stack:
    external: true