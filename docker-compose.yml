x-hf-tokenizer: &hf-tokenizer
  environment:
    EMBEDDING_TOKENIZER_HUB_ROOT: /tei-hub/hub
  volumes:
    - tei_hf_cache:/tei-hub:ro

services:
  ai-tools:
    <<: *hf-tokenizer
    build: .
    container_name: ai-tools
    env_file:
      - .env
    ports:
      - "8010:8000"
    networks:
      - ai_stack
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - embedding-tei
      - rerank-tei

  ai-tools-translate-worker:
    <<: *hf-tokenizer
    build: .
    container_name: ai-tools-translate-worker
    env_file:
      - .env
    command: ["uv", "run", "saq", "app.workers.documents_translate_worker.settings"]
    networks:
      - ai_stack
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  ai-tools-annotate-worker:
    <<: *hf-tokenizer
    build: .
    container_name: ai-tools-annotate-worker
    env_file:
      - .env
    command: ["uv", "run", "saq", "app.workers.documents_annotate_worker.settings"]
    networks:
      - ai_stack
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  ai-tools-categorize-worker:
    <<: *hf-tokenizer
    build: .
    container_name: ai-tools-categorize-worker
    env_file:
      - .env
    command: ["uv", "run", "saq", "app.workers.documents_categorize_worker.settings"]
    networks:
      - ai_stack
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  ai-tools-extractor-worker:
    <<: *hf-tokenizer
    build: .
    container_name: ai-tools-extractor-worker
    env_file:
      - .env
    command: ["uv", "run", "saq", "app.workers.documents_extractor_worker.settings"]
    networks:
      - ai_stack
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  ai-tools-tagger-worker:
    <<: *hf-tokenizer
    build: .
    container_name: ai-tools-tagger-worker
    env_file:
      - .env
    command: ["uv", "run", "saq", "app.workers.documents_tagger_worker.settings"]
    networks:
      - ai_stack
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  ai-tools-parse-worker:
    <<: *hf-tokenizer
    build: .
    container_name: ai-tools-parse-worker
    env_file:
      - .env
    command: ["uv", "run", "saq", "app.workers.documents_parse_worker.settings"]
    networks:
      - ai_stack
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  # Text Embeddings Inference — OpenAI-compatible POST /v1/embeddings (часто на порту 8089 с хоста).
  # Нужны NVIDIA-драйвер и NVIDIA Container Toolkit; при ошибке CDI:
  # https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/cdi-support.html
  # Первый старт скачивает модель в том tei_hf_cache. Без GPU замените образ на cpu-* (см. GHCR TEI).
  embedding-tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cuda-1.6
    container_name: ai-tools-embedding-tei
    gpus: all
    shm_size: "1gb"
    environment:
      HF_HOME: /data
      HUGGINGFACE_HUB_CACHE: /data/hub
    volumes:
      - tei_hf_cache:/data
    networks:
      - ai_stack
    ports:
      - "8089:80"
    command:
      - --model-id
      - BAAI/bge-m3
      - --revision
      - main
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 420s

  # Cross-encoder rerank (POST /rerank). Отдельный процесс от embedding-tei.
  # С хоста: http://127.0.0.1:8090/rerank . В .env: RAG_RERANK_BASE_URL=http://rerank-tei:80
  rerank-tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cuda-1.6
    container_name: ai-tools-rerank-tei
    gpus: all
    shm_size: "1gb"
    environment:
      HF_HOME: /data
      HUGGINGFACE_HUB_CACHE: /data/hub
    volumes:
      - tei_hf_cache:/data
    networks:
      - ai_stack
    ports:
      - "8090:80"
    command:
      - --model-id
      - BAAI/bge-reranker-v2-m3
      - --revision
      - main
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 420s

  ai-tools-ui:
    build:
      context: ./ai-tools-ui
    container_name: ai-tools-ui
    ports:
      - "8088:80"
    networks:
      - ai_stack
    restart: unless-stopped
    depends_on:
      - ai-tools

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-tools-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_stack
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai-tools-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - ai_stack
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  tei_hf_cache:

networks:
  ai_stack:
    external: true