services:
  ai-tools:
    build: .
    container_name: ai-tools
    env_file:
      - .env
    ports:
      - "8010:8000"
    networks:
      - ai_stack
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - postgres

  ai-tools-ui:
    build:
      context: ./ai-tools-ui
    container_name: ai-tools-ui
    ports:
      - "8088:80"
    networks:
      - ai_stack
    restart: unless-stopped
    depends_on:
      - ai-tools

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-tools-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_stack
    restart: unless-stopped
    ports:
      - "5432:5432"

volumes:
  postgres_data:

networks:
  ai_stack:
    external: true